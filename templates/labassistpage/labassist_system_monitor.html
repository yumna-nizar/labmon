<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lab Assistant System Monitor</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

  </head>
  <body class="bg-light">
    <div class="container py-5">

      <!-- Header -->
      <div class="row mb-4">
        <div class="col text-start">
            <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" fill="currentColor" class="bi bi-display" viewBox="0 0 16 16">
  <path d="M0 4s0-2 2-2h12s2 0 2 2v6s0 2-2 2h-4q0 1 .25 1.5H11a.5.5 0 0 1 0 1H5a.5.5 0 0 1 0-1h.75Q6 13 6 12H2s-2 0-2-2zm1.398-.855a.76.76 0 0 0-.254.302A1.5 1.5 0 0 0 1 4.01V10c0 .325.078.502.145.602q.105.156.302.254a1.5 1.5 0 0 0 .538.143L2.01 11H14c.325 0 .502-.078.602-.145a.76.76 0 0 0 .254-.302 1.5 1.5 0 0 0 .143-.538L15 9.99V4c0-.325-.078-.502-.145-.602a.76.76 0 0 0-.302-.254A1.5 1.5 0 0 0 13.99 3H2c-.325 0-.502.078-.602.145"/>
</svg>

          <h4 class="d-inline-block ms-3">Lab Assistant View System Monitor</h4>
        </div>
      </div>

      <!-- System Info -->
      <div class="row mb-4">
        <div class="col-md-6">
          <div class="mb-2"><strong>System No:</strong> SLM-2025-916</div>
          <div><strong>Lab:</strong> Lab 3</div>
        </div>
      </div>

      <!-- Staff Details -->
      <div class="row mb-4">
        <div class="col-md-6">
          <p><strong>Name:</strong> abc</p>
          <p><strong>Phone:</strong> +91 98765 43210</p>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="row g-3">
        <div class="col-md-4">
          <button class="btn btn-outline-dark w-100">File Logs</button>
        </div>
        <div class="col-md-4">
          <button class="btn btn-outline-dark w-100">Process Logs</button>
        </div>
        <div class="col-md-4">
          <button class="btn btn-outline-dark w-100">Key Logs</button>
        </div>
        <div class="col-md-4">
          <button class="btn btn-outline-dark w-100">Screenshot</button>
        </div>
        <div class="col-md-4">
          <button class="btn btn-outline-dark w-100">Commands</button>
        </div>
        <div class="col-md-4">
          <button class="btn btn-danger w-100">Shutdown</button>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS + Icons -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </body>
</html>
