{% extends 'labassistpage/labassist_index.html' %}
{% block body %}
{#<!DOCTYPE html>#}
{#<html lang="en">#}
{#<head>#}
{#    <meta charset="UTF-8">#}
{#    <title>View System</title>#}
{#    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">#}
{#</head>#}
{#<body>#}
<div class="container py-4">
    <!-- Top Controls -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <select class="form-select w-auto">
            <option selected>Choose Lab</option>
            <option value="1">Lab 1</option>
            <option value="2">Lab 2</option>
        </select>
        <button class="btn btn-primary">Show</button>
    </div>

    <!-- Resource Cards -->
    <div class="row g-4">
        <!-- Card 1 -->
        {% for i in data %}
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <p><strong>No:</strong> {{ i.systemno }}</p>
                    <p><strong>MAC:</strong>{{ i.macaddress }}</p>
                    <p><strong>Lab:</strong>{{ i.LAB.labno }}-{{ i.LAB.labname }}</p>
                    <div class="d-flex justify-content-end gap-2">
                        <a href="/myapp/admin_editsystem_get/{{ i.id }}" class="btn btn-sm btn-outline-secondary">Edit</a>
                        <a href="/myapp/admin_deletesystem_get/{{ i.id }}" class="btn btn-sm btn-outline-danger">Delete</a>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}

        <!-- Repeat for more cards -->
    </div>
</div>
{#</body>#}
{#</html>#}
{% endblock %}
