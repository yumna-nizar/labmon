<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff subject allocation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container .row {
            justify-content: center;
        }
    </style>


</head>
<body>
<div class="container">
    <h2 class="mb-4 text-center">Staff Subject allocation</h2>
    <form>
        <div class="row mb-3">
            <label for="staff" class="col-sm-2 ">Staff</label>
            <div class="col-sm-5">
                <select class="form-select" id="staff" name="staff" required>
                    <option>Select</option>
                    <option>Select</option>

                </select>
            </div>
        </div>

           <div class="row mb-3">
            <label for="course" class="col-sm-2 ">Course</label>
            <div class="col-sm-5">
                <select class="form-select" id="course" name="course" required>
                    <option>Select</option>
                    <option>Select</option>

                </select>
            </div>
        </div>
           <div class="row mb-3">
            <label for="dept" class="col-sm-2 ">Department</label>
            <div class="col-sm-5">
                <select class="form-select" id="dept" name="dept" required>
                    <option>Select</option>
                    <option>Select</option>

                </select>
            </div>
        </div>








        <div class="row mb-3">
            <label for="name" class="col-sm-2 ">Subject</label>
            <div class="col-sm-5">
                <select class="form-select" id="sub" name="sub" required>
                    <option>Select</option>
                    <option>Select</option>

                </select>
            </div>


            <div class="row mb-3">

            </div>


            <div class="row mb-3">
                <div class="offset-sm-4 col-sm-8">
                    <button type="submit" class="btn btn-primary">Allocate</button>
                </div>
            </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
