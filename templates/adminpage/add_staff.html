{%  extends 'adminpage/admin_index.html' %}
{% block body %}
{#<!DOCTYPE html>#}
{#<html lang="en">#}
{#<head>#}
{#  <meta charset="UTF-8">#}
{#  <title>Add Staff</title>#}
{#  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">#}

{#    justify-content: center;#}
{#  }#}
{#</style>#}
{##}
{# #}
{#</head>#}
{#<body>#}
  <div class="container">
    <h2 class="mb-4 text-center">Add staff</h2>
    <form action="/myapp/admin_addstaff_post/"method="post">
        {% csrf_token %}
      <div class="row mb-3">
        <label for="name" class="col-sm-2 ">Full Name</label>
        <div class="col-sm-5">
          <input type="text" class="form-control" id="name" name="name" required>
        </div>
      </div>

      <div class="row mb-3">
        <label class="col-sm-2 ">Gender</label>
        <div class="col-sm-5">
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="gender" value="male" id="male" required>
            <label class="form-check-label" for="male">Male</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="gender" value="female" id="female" required>
            <label class="form-check-label" for="female">Female</label>
          </div>
        </div>
      </div>

      <div class="row mb-3">
        <label for="dob" class="col-sm-2 ">Date of Birth</label>
        <div class="col-sm-5">
          <input type="date" class="form-control" id="dob" name="dob" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="email" class="col-sm-2 ">Email address</label>
        <div class="col-sm-5">
          <input type="email" class="form-control" id="email" name="email" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="phone" class="col-sm-2 ">Phone Number</label>
        <div class="col-sm-5">
          <input type="tel" pattern="[0-9]{10}" class="form-control" id="phone" name="phone" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="place" class="col-sm-2 ">Place</label>
        <div class="col-sm-5">
          <input type="text" class="form-control" id="place" name="place" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="city" class="col-sm-2 ">City</label>
        <div class="col-sm-5">
          <input type="text" class="form-control" id="city" name="city" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="state" class="col-sm-2 ">State</label>
        <div class="col-sm-5">
          <input type="text" class="form-control" id="state" name="state" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="pincode" class="col-sm-2 ">Pincode</label>
        <div class="col-sm-5">
          <input type="text" pattern="[0-9]{6}" class="form-control" id="pincode" name="pincode" required>
        </div>
      </div>
    <div class="row mb-3">
        <label for="dept" class="col-sm-2 ">Department</label>
        <div class="col-sm-5">
<select class="form-control" id="dept" name="dept" required>
                            {% for i in data %}
                            <option value="{{ i.id }}">{{ i.departementname }}</option>
                            {% endfor %}

                        </select>        </div>
      </div>




      <div class="row mb-3">
        <div class="offset-sm-4 col-sm-8">
          <button type="submit" class="btn btn-primary">Submit</button>
        </div>
      </div>
    </form>
  </div>
{#  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>#}
{#</body>#}
{#</html>#}
{% endblock %}
