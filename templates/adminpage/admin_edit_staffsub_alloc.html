<div class="container">
    <h2 class="mb-4 text-center">Edit Staff Subject allocation</h2>
    <form action="/myapp/admin_edit_staffsuballoc_post/" method="post">
        {% csrf_token %}
        <input type="hidden" name="id" value="{{ data2.id }}">
        <div class="row mb-3">
            <label for="staff" class="col-sm-2 ">Staff</label>
            <div class="col-sm-5">
                <select class="form-select" id="staff" name="staff" required>
                    {% for i in data %}
                    <option {% if data2.STAFF.id == i.id %} selected {% endif %} value="{{ i.id }}">{{ i.staffname }}</option>
                    {% endfor %}

                </select>
            </div>
        </div>

           <div class="row mb-3">
            <label for="course" class="col-sm-2 ">Subject</label>
            <div class="col-sm-5">
                <select class="form-select" id="course" name="subject" required>
                    {% for i in data1 %}
                    <option {% if data2.LABSUB.id == i.id %} selected {% endif %} value="{{ i.id }}">{{ i.subject }}</option>
                    {% endfor %}

                </select>
            </div>
           </div>

            <div class="row mb-3">
                <div class="offset-sm-4 col-sm-8">
                    <button type="submit" class="btn btn-primary">Allocate</button>
                </div>
            </div>
    </form>
</div>
