<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Lab subject scheduling</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container .row {
            justify-content: center;
        }
    </style>


</head>
<body>
<div class="container">
    <h2 class="mb-4 text-center">Edit Lab subject scheduling</h2>
    <form>
        <div class="row mb-3">
            <label for="name" class="col-sm-2 ">Day</label>
            <div class="col-sm-5">
                <select class="form-select" id="day" name="day" required>
                    <option>Select</option>
                    <option>Select</option>

                </select>
            </div>
        </div>

        <div class="row mb-3">
            <label class="col-sm-3 ">Hour</label>

            <div class="col-sm-2">
                <label class="col-sm-1 ">from</label>
                <select class="form-select" id="from" name="from" required>
                    <option>Select</option>
                    <option>Select</option>

                </select>
            </div>

            <div class="col-sm-2">
                <label class="col-sm-1 ">To</label>
                <select class="form-select" id="to" name="to" required>
                    <option>Select</option>
                    <option>Select</option>

                </select>
            </div>


        </div>

        <div class="row mb-3">
            <label for="name" class="col-sm-2 ">Lab</label>
            <div class="col-sm-5">
                <select class="form-select" id="lab" name="lab" required>
                    <option>Select</option>
                    <option>Select</option>

                </select>
            </div>


        </div>

        <div class="row mb-3">
            <label for="name" class="col-sm-3 ">Lab subject</label>
            <div class="col-sm-2">
                <label class="col-sm-1 ">Course</label>
                <select class="form-select" id="course" name="course" required>
                    <option>Select</option>
                    <option>Select</option>

                </select>
            </div>

            <div class="col-sm-2">
                <label class="col-sm-1 ">Sem</label>
                <select class="form-select" id="sem" name="sem" required>
                    <option>Select</option>
                    <option>Select</option>

                </select>
            </div>


        </div>

        <div class="row mb-3">
            <label for="name" class="col-sm-2 ">Subject</label>
            <div class="col-sm-5">
                <select class="form-select" id="sub" name="sub" required>
                    <option>Select</option>
                    <option>Select</option>

                </select>
            </div>


            <div class="row mb-3">

            </div>


            <div class="row mb-3">
                <div class="offset-sm-4 col-sm-8">
                    <button type="submit" class="btn btn-primary">Submit</button>
                </div>
            </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
