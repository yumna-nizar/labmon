{% extends 'adminpage/admin_index.html' %}
{% block body %}

<!-- DataTables CSS -->

<div class="container mt-5">
    <h3 class="mb-4">View Department</h3>

    <div class="table-responsive">
        <table class="table table-bordered table-hover" id="dept">
            <thead class="table-light">
                <tr>
                    <th>SNo</th>
                    <th>Department Name</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for i in data %}
                <tr>
                    <td width="5%">{{ forloop.counter }}</td>
                    <td>{{ i.departementname }}</td>
                    <td width="15%">
                        <a href="/myapp/admin_editdepartment_get/{{ i.id }}"
                           class="btn btn-sm btn-success">Edit</a>
                        <a href="/myapp/admin_delete_department/{{ i.id }}"
                           class="btn btn-sm btn-danger">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<!-- jQuery -->
{% block scripts %}
<!-- DataTable Init -->
<script>
    $(document).ready(function () {
        $('#dept').DataTable({
            paging: true,        // pagination
            searching: true,     // search box
            ordering: true,      // sorting
            pageLength: 10       // rows per page
        });
    });
</script>

{% endblock %}
{% endblock %}
