{%  extends 'adminpage/admin_index.html' %}
{% block body %}
{#<!DOCTYPE html>#}
{#<html lang="en">#}
{#<head>#}
{#    <meta charset="UTF-8">#}
{#    <title>Edit Student</title>#}
{#    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">#}

{#</head>#}
{#<body>#}
<div class="container">
    <h2 class="mb-4 text-center">Edit Student</h2>
    <form action="/myapp/admin_editstudent_post/" method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <input type="hidden"value="{{ data.id }}" name="id">
        <div class="row mb-3">
            <label for="name" class="col-sm-2 ">Full Name</label>
            <div class="col-sm-5">
                <input type="text" class="form-control" name="name" value="{{ data.studentname }}" id="name" required>
            </div>
        </div>

        <div class="row mb-3">
            <label class="col-sm-2 ">Gender</label>
            <div class="col-sm-5">
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" {% if data.gender == 'male' %} checked {% endif %} value="male" id="male" required>
                    <label class="form-check-label" for="male">Male</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender"  {% if data.gender == 'female' %} checked {% endif %} value="female" id="female" required>
                    <label class="form-check-label" for="female">Female</label>
                </div>
            </div>
        </div>

        <div class="row mb-3">
            <label for="dob" class="col-sm-2 ">Date of Birth</label>
            <div class="col-sm-5">
                <input type="date" class="form-control" id="dob" name="dob" value="{{ data.dob|date:'Y-m-d' }}" required>
            </div>
        </div>

        <div class="row mb-3">
            <label for="email" class="col-sm-2 ">Email address</label>
            <div class="col-sm-5">
                <input type="email" class="form-control" id="email"name="email" value="{{ data.email }}" required>
            </div>
        </div>

        <div class="row mb-3">
            <label for="phone" class="col-sm-2 ">Phone Number</label>
            <div class="col-sm-5">
                <input type="tel" pattern="[0-9]{10}" class="form-control" name="phone" value="{{ data.phone }}" id="phone" required>
            </div>
        </div>

        <div class="row mb-3">
            <label for="place" class="col-sm-2 ">Place</label>
            <div class="col-sm-5">
                <input type="text" class="form-control" id="place" name="place" value="{{ data.place }}" required>
            </div>
        </div>

        <div class="row mb-3">
            <label for="city" class="col-sm-2 ">City</label>
            <div class="col-sm-5">
                <input type="text" class="form-control" id="city" name="city" value="{{ data.city }}"  required>
            </div>
        </div>

        <div class="row mb-3">
            <label for="state" class="col-sm-2 ">State</label>
            <div class="col-sm-5">
                <input type="text" class="form-control" id="state" name="state" value="{{ data.state }}" required>
            </div>
        </div>

        <div class="row mb-3">
            <label for="pincode" class="col-sm-2 ">Pincode</label>
            <div class="col-sm-5">
                <input type="text" pattern="[0-9]{6}" class="form-control" id="pincode" name="pincode" value="{{ data.pincode }}" required>
            </div>
        </div>

        <div class="row mb-3">
            <label for="photo" class="col-sm-2 ">Upload Photo</label>
            <div class="col-sm-5">
                <img src="{{ data.photo }}" height="100" width="100">
                <input type="file" class="form-control" id="photo" accept="image/*" name="photo" >
            </div>
        </div>

        <div class="row mb-3">
            <label for="course" class="col-sm-2 ">Course</label>
            <div class="col-sm-5">
                <select class="form-select" id="course" name="cid" required>
                    {% for i in data1 %}
                    <option {% if data.COURSE.id == i.id %} selected{%  endif %} value="{{ i.id }}">{{ i.coursename }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="row mb-3">
            <div class="offset-sm-4 col-sm-8">
                <button type="submit" class="btn btn-primary">Submit</button>
            </div>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{% endblock %}
