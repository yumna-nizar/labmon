<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <!-- Top Controls -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <select class="form-select w-auto">
            <option selected>Choose Lab</option>
            <option value="1">Lab 1</option>
            <option value="2">Lab 2</option>
        </select>
        <button class="btn btn-primary">Show</button>
    </div>

    <!-- Resource Cards -->
    <div class="row g-4">
        <!-- Card 1 -->
        <div class="col-md-6">
            <div class="card shadow-sm">
                <img src="" height="20px" width="20px" class="card-img-top"
                     alt="Resource Image">
                <div class="card-body">
                    <p><strong>No:</strong> 001</p>
                    <p><strong>MAC:</strong> 00:1A:2B:3C:4D:5E</p>
                    <p><strong>Lab:</strong> a</p>
                    <div class="d-flex justify-content-end gap-2">
                        <button class="btn btn-sm btn-outline-secondary">Edit</button>
                        <button class="btn btn-sm btn-outline-danger">Delete</button>
                    </div>
                </div>
            </div>
        </div>
         <div class="col-md-6">
            <div class="card shadow-sm">
                <img src="" height="20px" width="20px" class="card-img-top"
                     alt="Resource Image">
                <div class="card-body">
                    <p><strong>No:</strong> 001</p>
                    <p><strong>MAC:</strong> 00:1A:2B:3C:4D:5E</p>
                    <p><strong>Lab:</strong> a</p>
                    <div class="d-flex justify-content-end gap-2">
                        <button class="btn btn-sm btn-outline-secondary">Edit</button>
                        <button class="btn btn-sm btn-outline-danger">Delete</button>
                    </div>
                </div>
            </div>
        </div>
         <div class="col-md-6">
            <div class="card shadow-sm">
                <img src="" height="20px" width="20px" class="card-img-top"
                     alt="Resource Image">
                <div class="card-body">
                    <p><strong>No:</strong> 001</p>
                    <p><strong>MAC:</strong> 00:1A:2B:3C:4D:5E</p>
                    <p><strong>Lab:</strong> b</p>
                    <div class="d-flex justify-content-end gap-2">
                        <button class="btn btn-sm btn-outline-secondary">Edit</button>
                        <button class="btn btn-sm btn-outline-danger">Delete</button>
                    </div>
                </div>
            </div>
        </div>
 <div class="col-md-6">
            <div class="card shadow-sm">
                <img src="" height="20px" width="20px" class="card-img-top"
                     alt="Resource Image">
                <div class="card-body">
                    <p><strong>No:</strong> 001</p>
                    <p><strong>MAC:</strong> 00:1A:2B:3C:4D:5E</p>
                    <p><strong>Lab:</strong> c</p>
                    <div class="d-flex justify-content-end gap-2">
                        <button class="btn btn-sm btn-outline-secondary">Edit</button>
                        <button class="btn btn-sm btn-outline-danger">Delete</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- Repeat for more cards -->
    </div>
</div>
</body>
</html>
