<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center">Add Course</h2>
            <form action="/myapp/admin_add_course_post/" method="post">
            {% csrf_token %}


                    <div class="form-group">
                        <label for="dept">Department</label>
                        <select class="form-control" id="dept" name="dept" required>
                            {% for i in data %}
                            <option value="{{ i.id }}">{{ i.departementname }}</option>
                            {% endfor %}

                        </select>
                    </div>


                    <div class="form-group">
                        <label for="course">Course Name</label>
                        <input type="text" class="form-control" id="course" name="course"
                               placeholder="Enter your Course" required>
                    </div>

                    <div class="form-group">
                        <label for="totsem">Total sem</label>
                        <input type="text" class="form-control" id="totsem" name="totsem"
                               placeholder="Enter the total sem " required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Submit</button>

            </form>

        </div>
    </div>
</div>
