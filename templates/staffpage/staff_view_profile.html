<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Staff View Profile</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f0f2f5;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .profile-card {
        background-color: #fff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        max-width: 600px;
        width: 100%;
      }
      .profile-img {
        width: 150px;
        height: 150px;
        object-fit: cover;
        border-radius: 50%;
        margin-bottom: 30px;
      }
      .profile-info p {
        margin-bottom: 15px;
        font-size: 1.1rem;
      }
      .label {
        font-weight: 600;
        color: #333;
      }
    </style>
  </head>
 <body>

    <div class="profile-card text-center">
      <img
        src="https://via.placeholder.com/150"
        alt="Profile Image"
        class="profile-img"
      />

      <div class="profile-info text-start px-4">
        <p><span class="label">Name:</span> abc</p>
        <p><span class="label">Gender:</span> Female</p>
        <p><span class="label">Date of Birth:</span> 12 March 1998</p>
        <p><span class="label">Address:</span> Kozhikode, Kerala, India</p>
      </div>
    </div>

    <!-- Bootstrap JS (optional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
