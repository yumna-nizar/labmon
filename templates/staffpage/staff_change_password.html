<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Change Password</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <style>
        .container .row {
            justify-content: center;
        }
    </style>


</head>
<body>


<h2 class="text-center m-4">Staff Change password</h2>

<div class="container">
    <form>




        <div class="row mb-3">
            <label for="old_pass" class="col-sm-2 ">Old Password</label>
            <div class="col-sm-5">
                <input type="password" class="form-control" name="old_pass" required>
            </div>
        </div>

         <div class="row mb-3">
            <label for="new_pass" class="col-sm-2 ">New Password</label>
            <div class="col-sm-5">
                <input type="password" class="form-control" name="new_pass" required>
            </div>
        </div>

        <div class="row mb-3">
            <label for="confirm_pass" class="col-sm-2 ">Confirm Password</label>
            <div class="col-sm-5">
                <input type="password" class="form-control" name="confirm_pass" required>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-sm-3">
                <button type="submit" class="btn btn-primary btn-block">Change Password</button>
            </div>
        </div>
    </form>
</div>


<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html
