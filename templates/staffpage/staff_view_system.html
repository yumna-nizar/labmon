<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staff View System</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container py-5">
    <!-- Header -->
    <div class="text-center mb-4">
      <h2 class="fw-bold">View System</h2>
    </div>

    <!-- Search Bar -->
    <div class="row justify-content-center mb-4">
      <div class="col-md-6">
        <div class="input-group">
          <input type="text" class="form-control" placeholder="Search">
          <button class="btn btn-outline-primary">GO</button>
        </div>
      </div>
    </div>

    <!-- Student Info Card -->
    <div class="card mx-auto" style="max-width: 600px;">
      <div class="card-body text-center">
        <img src="https://via.placeholder.com/120" class="rounded-circle mb-3" alt="Student Photo">
        <div class="text-start px-4">
          <p><strong>Student Name:</strong> Yumna</p>
          <p><strong>System ID:</strong> SYS-2025-001</p>
        </div>
        <button class="btn btn-success mt-3">Monitor</button>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
