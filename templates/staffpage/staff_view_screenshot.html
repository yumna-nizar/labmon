<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staff View Screenshot</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container py-5">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="mb-0">Staff View - Screenshot</h4>
      <button class="btn btn-primary">Take Screenshot</button>
    </div>

    <!-- Screenshot Results -->
    <div class="card mb-4">
      <div class="card-header fw-bold">Result Screenshot</div>
      <div class="card-body">
        <div class="row g-4">
          <!-- Screenshot Item 1 -->
          <div class="col-md-6">
            <div class="card">
              <img src="https://via.placeholder.com/400x200" class="card-img-top" alt="Screenshot 1">
              <div class="card-body">
                <p class="card-text"><strong>Date & Time:</strong> 23 Aug 2025, 11:45 AM</p>
              </div>
            </div>
          </div>
          <!-- Screenshot Item 2 -->
          <div class="col-md-6">
            <div class="card">
              <img src="https://via.placeholder.com/400x200" class="card-img-top" alt="Screenshot 2">
              <div class="card-body">
                <p class="card-text"><strong>Date & Time:</strong> 23 Aug 2025, 11:50 AM</p>
              </div>
            </div>
          </div>
          <!-- Add more screenshots as needed -->
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
